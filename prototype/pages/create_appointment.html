<!doctype html>
<html lang="en">

<head>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

  <script>

      $("#nav-bar").load("../components/navbar/navbar.html");

      $("#time").load("../components/time/time.html");
    })
