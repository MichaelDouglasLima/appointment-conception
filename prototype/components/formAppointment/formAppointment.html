<h1>Formulário</h1>
<form>
  <div class="row mt-3">
    <select class="form-select" aria-label="Default select example">
      <option selected>Selecione a Área:</option>
      <option value="1">Área 1</option>
      <option value="2">Área 2</option>
    </select>
  </div>

  <div class="row mt-3">
    <select class="form-select" aria-label="Default select example">
      <option selected>Selecione o Profissional:</option>
      <option value="1">Profissional 1</option>
      <option value="2">Profissional 2</option>
    </select>
  </div>

  <div class="row mt-3 text-start">
    <div>
      Tipo de Atendimento:
    </div>

    <div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
        <label class="form-check-label" for="radioDefault1">
          Particular
        </label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2" checked>
        <label class="form-check-label" for="radioDefault2">
          Convênio
        </label>
      </div>
    </div>

  </div>

  <div class="row mt-3">
    <select class="form-select" aria-label="Default select example">
      <option selected>Selecione o Cliente:</option>
      <option value="1">Cliente 1</option>
      <option value="2">Cliente 2</option>
    </select>
  </div>

  <div class="row mt-3">
    <div class="form-floating">
      <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea2"
        style="height: 100px"></textarea>
      <label for="floatingTextarea2">Comentários</label>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-6 offset-3">
      <button type="button" class="btn btn-primary btn-lg">Agendar</button>
    </div>

  </div>

</form>
