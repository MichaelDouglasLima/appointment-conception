<div class="">
  <div class="display-6 text-center">
    Cadastro de Clientes
  </div>

  <div class="row">
    <div class="col-10 offset-1">
      <form class="mt-4">
        <div class="text-center">Nome:</div>

        <div class="mt-3">
          <label for="inputName" class="form-label">Nome:</label>
          <input type="text" class="form-control" id="inputName" placeholder="Nome">
          <div class="text-danger">*Nome é obrigatório!</div>
        </div>

        <div class="row mt-3 text-center">
          <div class="col-6">
            <label for="inputCellphone" class="form-label">Celular:</label>
            <input type="text" class="form-control" id="inputCellphone" placeholder="Celular">
            <div class="text-danger text-start">*Celular é obrigatório!</div>
          </div>

          <div class="col-6">
            <label for="inputBirthDate" class="form-label">Data de Nascimento:</label>
            <input type="date" class="form-control" id="inputBirthDate">
            <div class="text-danger text-start">*Data de Nascimento é obrigatória!</div>
          </div>
        </div>

        <div class="mt-3 text-end">
          <button type="button" class="btn btn-secondary">Cancelar</button>
          <button type="button" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

</div>
